<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ML.js Vorhersage</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdn.jsdelivr.net/npm/ml-regression-simple-linear@2/lib/simple-linear-regression.min.js"></script>
</head>
<body>
  <main class="container py-5">
    <div class="card shadow-sm p-4 mx-auto app-card">
      <h1 class="h3 mb-4">Vorhersage</h1>

      <div class="row g-3">
        <div class="col-md-6">
          <label for="state_code" class="form-label">state_code</label>
          <select id="state_code" class="form-select">
            <option value="CA" selected>CA</option>
            <option value="NY">NY</option>
            <option value="OTHER">OTHER</option>
          </select>
        </div>

        <!--
        <div class="col-md-6">
          <label for="labels" class="form-label">labels</label>
          <input type="number" id="labels" class="form-control" min="0" step="1" value="1">
        </div>
        -->
        <div class="col-md-6">
          <label for="age_first_funding_year" class="form-label">age_first_funding_year</label>
          <input type="number" id="age_first_funding_year" class="form-control" step="0.0001" value="0.7945">
        </div>

        <div class="col-md-6">
          <label for="age_last_funding_year" class="form-label">age_last_funding_year</label>
          <input type="number" id="age_last_funding_year" class="form-control" step="0.0001" value="2.9014">
        </div>

        <div class="col-md-6">
          <label for="age_first_milestone_year" class="form-label">age_first_milestone_year</label>
          <input type="number" id="age_first_milestone_year" class="form-control" step="0.0001" value="3.0493">
        </div>

        <div class="col-md-6">
          <label for="age_last_milestone_year" class="form-label">age_last_milestone_year</label>
          <input type="number" id="age_last_milestone_year" class="form-control" step="0.0001" value="6.5233">
        </div>

        <div class="col-md-4">
          <label for="relationships" class="form-label">relationships</label>
          <input type="range" id="relationships" class="form-range" min="0" max="30" step="1" value="11">
          <small class="text-muted">Wert: <span id="relationships_val">11</span></small>
        </div>

        <div class="col-md-4">
          <label for="funding_rounds" class="form-label">funding_rounds</label>
          <input type="range" id="funding_rounds" class="form-range" min="0" max="15" step="1" value="2">
          <small class="text-muted">Wert: <span id="funding_rounds_val">2</span></small>
        </div>

        <div class="col-md-4">
          <label for="milestones" class="form-label">milestones</label>
          <input type="range" id="milestones" class="form-range" min="0" max="15" step="1" value="3">
          <small class="text-muted">Wert: <span id="milestones_val">3</span></small>
        </div>

        <div class="col-md-6">
          <label for="funding_total_usd" class="form-label">funding_total_usd</label>
          <input type="number" id="funding_total_usd" class="form-control" min="0" step="1000" value="2750000">
        </div>

        <div class="col-md-6">
          <label for="has_Investor" class="form-label d-block">has_Investor</label>
          <div class="form-check">
            <input class="form-check-input" type="checkbox" id="has_Investor" checked>
            <label class="form-check-label" for="has_Investor">True</label>
          </div>
        </div>

        <div class="col-md-4">
          <label for="founding_year" class="form-label">founding_year</label>
          <input type="number" id="founding_year" class="form-control" value="2007">
        </div>

        <div class="col-md-4">
          <label for="first_funding_year" class="form-label">first_funding_year</label>
          <input type="number" id="first_funding_year" class="form-control" value="2007">
        </div>

        <div class="col-md-4">
          <label for="last_funding_year" class="form-label">last_funding_year</label>
          <input type="number" id="last_funding_year" class="form-control" value="2009">
        </div>

        <div class="col-12">
          <label class="form-label d-block">One-Hot Orts-Features</label>
          <div class="row g-2">
            <div class="col-md-4 form-check">
              <input class="form-check-input" type="checkbox" id="is_mountain_view">
              <label class="form-check-label" for="is_mountain_view">is_Mountain View</label>
            </div>
            <div class="col-md-4 form-check">
              <input class="form-check-input" type="checkbox" id="is_new_york">
              <label class="form-check-label" for="is_new_york">is_New York</label>
            </div>
            <div class="col-md-4 form-check">
              <input class="form-check-input" type="checkbox" id="is_palo_alto">
              <label class="form-check-label" for="is_palo_alto">is_Palo Alto</label>
            </div>
            <div class="col-md-4 form-check">
              <input class="form-check-input" type="checkbox" id="is_san_francisco">
              <label class="form-check-label" for="is_san_francisco">is_San Francisco</label>
            </div>
            <div class="col-md-4 form-check">
              <input class="form-check-input" type="checkbox" id="is_santa_clara">
              <label class="form-check-label" for="is_santa_clara">is_Santa Clara</label>
            </div>
            <div class="col-md-4 form-check">
              <input class="form-check-input" type="checkbox" id="is_other" checked>
              <label class="form-check-label" for="is_other">is_other</label>
            </div>
          </div>
        </div>
      </div>

      <button id="predictBtn" class="btn btn-primary w-100" onclick="predict()" disabled>
        Vorhersage berechnen
      </button>

      <div class="alert alert-light border mt-4 mb-0" id="result">
        Modell wird geladen...
      </div>
    </div>
  </main>

  <script src="predict.js"></script>
</body>
</html>
