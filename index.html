<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ML.js Vorhersage</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="container py-5">
    <div class="card shadow-sm p-4 mx-auto app-card">
      <h1 class="h3 mb-4">Vorhersage</h1>

      <div class="row g-3">
        <div class="col-md-4">
          <label for="founded_at" class="form-label">founded_at</label>
          <input type="date" id="founded_at" class="form-control" value="2002-01-01">
        </div>

        <div class="col-md-4">
          <label for="first_funding_at" class="form-label">first_funding_at</label>
          <input type="date" id="first_funding_at" class="form-control" value="2006-07-18">
        </div>

        <div class="col-md-4">
          <label for="last_funding_at" class="form-label">last_funding_at</label>
          <input type="date" id="last_funding_at" class="form-control" value="2006-07-18">
        </div>

        <div class="col-md-6">
          <label for="age_first_funding_year" class="form-label">age_first_funding_year</label>
          <input type="number" id="age_first_funding_year" class="form-control" step="0.0001" value="2.2493">
        </div>

        <div class="col-md-6">
          <label for="age_last_funding_year" class="form-label">age_last_funding_year</label>
          <input type="number" id="age_last_funding_year" class="form-control" step="0.0001" value="3.0027">
        </div>

        <div class="col-md-6">
          <label for="age_first_milestone_year" class="form-label">age_first_milestone_year</label>
          <input type="number" id="age_first_milestone_year" class="form-control" step="0.0001" value="4.6685">
        </div>

        <div class="col-md-6">
          <label for="age_last_milestone_year" class="form-label">age_last_milestone_year</label>
          <input type="number" id="age_last_milestone_year" class="form-control" step="0.0001" value="6.7041">
        </div>

        <div class="col-md-4">
          <label for="relationships" class="form-label">relationships</label>
          <input type="range" id="relationships" class="form-range" min="0" max="30" step="1" value="3">
          <small class="text-muted">Wert: <span id="relationships_val">3</span></small>
        </div>

        <div class="col-md-4">
          <label for="funding_rounds" class="form-label">funding_rounds</label>
          <input type="range" id="funding_rounds" class="form-range" min="0" max="15" step="1" value="3">
          <small class="text-muted">Wert: <span id="funding_rounds_val">3</span></small>
        </div>

        <div class="col-md-4">
          <label for="milestones" class="form-label">milestones</label>
          <input type="range" id="milestones" class="form-range" min="0" max="15" step="1" value="3">
          <small class="text-muted">Wert: <span id="milestones_val">3</span></small>
        </div>

        <div class="col-md-6">
          <label for="funding_total_usd" class="form-label">funding_total_usd</label>
          <input type="number" id="funding_total_usd" class="form-control" min="0" step="1000" value="375000">
        </div>

        <div class="col-md-6">
          <label for="avg_participants" class="form-label">avg_participants</label>
          <input type="number" id="avg_participants" class="form-control" step="0.01" value="3.0">
        </div>

        <div class="col-md-6">
          <label for="category_code" class="form-label">category_code</label>
          <select id="category_code" class="form-select">
            <option value="music">music</option>
            <option value="enterprise">enterprise</option>
            <option value="web">web</option>
            <option value="other">other</option>
            <option value="network_hosting" selected>network_hosting</option>
          </select>
        </div>

        <div class="col-md-6">
          <label for="category_one_hot" class="form-label">Category One-Hot</label>
          <select id="category_one_hot" class="form-select">
            <option value="is_software">is_software</option>
            <option value="is_web">is_web</option>
            <option value="is_mobile">is_mobile</option>
            <option value="is_enterprise">is_enterprise</option>
            <option value="is_advertising">is_advertising</option>
            <option value="is_gamesvideo">is_gamesvideo</option>
            <option value="is_ecommerce">is_ecommerce</option>
            <option value="is_biotech">is_biotech</option>
            <option value="is_consulting">is_consulting</option>
            <option value="is_othercategory" selected>is_othercategory</option>
          </select>
        </div>

        <div class="col-12">
          <label class="form-label d-block">State One-Hot</label>
          <div class="row g-2">
            <div class="col-md-3 form-check">
              <input class="form-check-input" type="checkbox" id="is_ca">
              <label class="form-check-label" for="is_ca">is_CA</label>
            </div>
            <div class="col-md-3 form-check">
              <input class="form-check-input" type="checkbox" id="is_ny">
              <label class="form-check-label" for="is_ny">is_NY</label>
            </div>
            <div class="col-md-3 form-check">
              <input class="form-check-input" type="checkbox" id="is_ma">
              <label class="form-check-label" for="is_ma">is_MA</label>
            </div>
            <div class="col-md-3 form-check">
              <input class="form-check-input" type="checkbox" id="is_tx">
              <label class="form-check-label" for="is_tx">is_TX</label>
            </div>
            <div class="col-md-3 form-check">
              <input class="form-check-input" type="checkbox" id="is_otherstate">
              <label class="form-check-label" for="is_otherstate">is_otherstate</label>
            </div>
          </div>
        </div>

        <div class="col-12">
          <label class="form-label d-block">Funding Flags</label>
          <div class="row g-2">
            <div class="col-md-3 form-check"><input class="form-check-input" type="checkbox" id="has_vc"><label class="form-check-label" for="has_vc">has_VC</label></div>
            <div class="col-md-3 form-check"><input class="form-check-input" type="checkbox" id="has_angel" checked><label class="form-check-label" for="has_angel">has_angel</label></div>
            <div class="col-md-3 form-check"><input class="form-check-input" type="checkbox" id="has_rounda"><label class="form-check-label" for="has_rounda">has_roundA</label></div>
            <div class="col-md-3 form-check"><input class="form-check-input" type="checkbox" id="has_roundb" checked><label class="form-check-label" for="has_roundb">has_roundB</label></div>
            <div class="col-md-3 form-check"><input class="form-check-input" type="checkbox" id="has_roundc"><label class="form-check-label" for="has_roundc">has_roundC</label></div>
            <div class="col-md-3 form-check"><input class="form-check-input" type="checkbox" id="has_roundd"><label class="form-check-label" for="has_roundd">has_roundD</label></div>
            <div class="col-md-3 form-check"><input class="form-check-input" type="checkbox" id="is_top500" checked><label class="form-check-label" for="is_top500">is_top500</label></div>
            <div class="col-md-3 form-check"><input class="form-check-input" type="checkbox" id="has_roundabcd" checked><label class="form-check-label" for="has_roundabcd">has_RoundABCD</label></div>
            <div class="col-md-3 form-check"><input class="form-check-input" type="checkbox" id="has_investor"><label class="form-check-label" for="has_investor">has_Investor</label></div>
          </div>
        </div>
      </div>

      <button id="predictBtn" class="btn btn-primary w-100" onclick="predict()" disabled>
        Vorhersage berechnen
      </button>

      <div class="alert alert-light border mt-4 mb-0" id="result">
        Modell wird geladen...
      </div>
    </div>
  </main>

  <script src="predict.js"></script>
</body>
</html>
